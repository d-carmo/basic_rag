name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ── Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dev deps
        run: uv sync --extra dev

      - name: Run ruff (lint)
        run: uv run ruff check src tests

      - name: Run ruff (format check)
        run: uv run ruff format --check src tests

  # ── Type check ─────────────────────────────────────────────────────────────
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dev deps
        run: uv sync --extra dev

      - name: Run mypy
        run: uv run mypy src

  # ── Unit tests ─────────────────────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dev deps
        run: uv sync --extra dev

      - name: Run pytest (unit, no integration)
        run: uv run pytest -m "not integration and not slow" --cov=src/rag --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true

  # ── Integration tests (services required) ──────────────────────────────────
  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    services:
      qdrant:
        image: qdrant/qdrant:v1.13.0
        ports:
          - 6333:6333
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      QDRANT_URL: http://localhost:6333
      REDIS_URL: redis://localhost:6379/0
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dev deps
        run: uv sync --extra dev

      - name: Run integration tests
        run: uv run pytest -m "integration" -v

  # ── Eval suite ─────────────────────────────────────────────────────────────
  eval:
    name: Eval (RAGAS regression)
    runs-on: ubuntu-latest
    needs: [integration]
    # Only run on main branch to avoid burning API credits on every PR
    if: github.ref == 'refs/heads/main'
    services:
      qdrant:
        image: qdrant/qdrant:v1.13.0
        ports:
          - 6333:6333
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
    env:
      QDRANT_URL: http://localhost:6333
      REDIS_URL: redis://localhost:6379/0
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install eval deps
        run: uv sync --extra dev --extra eval

      - name: Run eval suite
        run: uv run python -m rag.eval run --dataset eval/golden.jsonl --report eval/results/report.json --baseline eval/baseline.json
